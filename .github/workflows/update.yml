name: 지표 자동 업데이트

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 지표 수집 스크립트 실행
        run: python scraper.py

      - name: data.json 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "변경사항 없음 - 커밋 건너뜀"
          else
            git commit -m "지표 자동 업데이트: $(date -u +'%Y-%m-%d')"
            git push
          fi
