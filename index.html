<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국·미국 매크로 모니터</title>
<style>
:root{
  --app-bg:#faf9f5; --card-bg:#ffffff; --surface:#f1efe8;
  --border:rgba(0,0,0,0.12); --border-md:rgba(0,0,0,0.22);
  --tx1:#1a1a18; --tx2:#5f5e5a; --tx3:#8b8a83;
  --danger:#E24B4A; --warn:#BA7517; --ok:#1D9E75;
  --danger-bg:#FCEBEB; --warn-bg:#FAEEDA; --ok-bg:#E1F5EE;
  --danger-tx:#A32D2D; --warn-tx:#854F0B; --ok-tx:#0F6E56;
  --info:#378ADD;
}
@media (prefers-color-scheme:dark){
  :root{
    --app-bg:#1f1e1c; --card-bg:#2a2926; --surface:#2f2e2a;
    --border:rgba(255,255,255,0.12); --border-md:rgba(255,255,255,0.22);
    --tx1:#f0efe9; --tx2:#b4b2a9; --tx3:#888780;
    --danger-bg:#3a1f1f; --warn-bg:#3a2e1a; --ok-bg:#16302a;
    --danger-tx:#F09595; --warn-tx:#FAC775; --ok-tx:#5DCAA5;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--app-bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",
  "Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:var(--tx1);
  -webkit-font-smoothing:antialiased;padding:16px}
.wrap{max-width:680px;margin:0 auto}
.head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px}
.head h1{font-size:18px;font-weight:600}
.head .upd{font-size:11px;color:var(--tx3);text-align:right;line-height:1.5}
.market-switch{display:flex;gap:6px;margin:12px 0}
.ms-btn{flex:1;padding:9px;font-size:13px;font-weight:600;border:1px solid var(--border);
  border-radius:8px;background:var(--card-bg);color:var(--tx2);cursor:pointer;
  font-family:inherit}
.ms-btn.active{background:var(--tx1);color:var(--app-bg);border-color:var(--tx1)}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;
  overflow-x:auto}
.tab{padding:9px 13px;font-size:13px;cursor:pointer;border:none;background:none;
  color:var(--tx2);border-bottom:2px solid transparent;white-space:nowrap;
  font-family:inherit}
.tab.active{color:var(--tx1);border-bottom-color:var(--tx1);font-weight:600}
.view{display:none}.view.active{display:block}
.score-banner{display:flex;align-items:center;gap:16px;padding:14px 16px;
  border-radius:12px;margin-bottom:12px}
.score-num{font-size:46px;font-weight:600;line-height:1}
.score-title{font-size:14px;font-weight:600;margin-bottom:3px}
.score-sub{font-size:11px;line-height:1.5;opacity:.85}
.trend-strip{background:var(--surface);border-radius:8px;padding:10px 14px;
  margin-bottom:12px;display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.macro-banner{display:flex;gap:8px;margin-bottom:12px}
.mb-card{flex:1;border-radius:8px;padding:10px 12px}
.mb-lb{font-size:11px;margin-bottom:2px;font-weight:600}
.mb-val{font-size:18px;font-weight:600}
.mb-date{font-size:10px;opacity:.8;margin-top:1px}
.ind-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.ind-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px}
.ic-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.ic-label{font-size:11px;color:var(--tx3);font-weight:600}
.ic-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:2px}
.ic-val{font-size:20px;font-weight:600;margin-bottom:2px}
.ic-sub{font-size:11px;color:var(--tx2)}
.ic-src{font-size:10px;margin-top:5px;padding-top:5px;border-top:1px solid var(--border)}
.bar-wrap{height:4px;background:var(--surface);border-radius:2px;overflow:hidden;
  margin-top:6px}
.bar-fill{height:4px;border-radius:2px}
.dot-d{background:var(--danger)}.dot-w{background:var(--warn)}.dot-ok{background:var(--ok)}
.abar{border-radius:8px;padding:9px 12px;margin-bottom:8px;font-size:12px;
  line-height:1.55;background:var(--warn-bg);color:var(--warn-tx)}
.sec-title{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;
  align-items:center;gap:6px}
.hist-entry{display:flex;gap:10px;align-items:center;padding:9px 0;
  border-bottom:1px solid var(--border)}
.hist-date{font-size:11px;color:var(--tx3);flex:0 0 42px}
.hist-pill{font-size:13px;font-weight:600;flex:0 0 44px;text-align:center}
/* AI 분석 카드 */
.ai-card{background:var(--surface);border-radius:12px;padding:14px 16px;
  margin-bottom:12px}
.ai-card-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai-flag{font-size:16px}
.ai-card-title{font-size:13px;font-weight:600}
.ai-card-meta{font-size:10px;color:var(--tx3)}
.ai-card-body{font-size:13px;color:var(--tx2);line-height:1.7}
.ai-summary{background:linear-gradient(135deg,var(--ok-bg),var(--surface));
  border:1px solid var(--border);border-radius:12px;padding:16px}
.ai-summary .ai-card-title{font-size:14px}
.score-row{display:flex;gap:8px;margin-bottom:14px}
.score-mini{flex:1;background:var(--card-bg);border:1px solid var(--border);
  border-radius:10px;padding:12px;text-align:center}
.sm-lb{font-size:11px;color:var(--tx3);margin-bottom:4px}
.sm-num{font-size:26px;font-weight:600}
.loading{text-align:center;padding:40px;color:var(--tx3);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>한국·미국 매크로 모니터</h1>
    <div class="upd" id="upd">불러오는 중...</div>
  </div>

  <div class="market-switch">
    <button class="ms-btn active" data-mkt="kr">🇰🇷 한국</button>
    <button class="ms-btn" data-mkt="us">🇺🇸 미국</button>
    <button class="ms-btn" data-mkt="summary">종합</button>
  </div>

  <div id="body"><div class="loading">데이터 불러오는 중...</div></div>
</div>

<script>
const META={
  vkospi:{rng:[0,83]}, usdkrw:{rng:[1200,1600]}, foreigner:{rng:null},
  bbb:{rng:[0,400]}, spread:{rng:[-30,80]}, cp:{rng:[0,150]},
  semi:{rng:[0,160]}, cds:{rng:[0,120]},
  vix:{rng:[0,50]}, hy:{rng:[0,10]}, wti:{rng:[40,130]}, brent:{rng:[40,140]},
  us2y:{rng:[0,6]}, us10y:{rng:[0,6.5]}, us30y:{rng:[0,7]}, usspread:{rng:[-1,2]},
};
const SRC={naver:'자동수집',fred:'FRED 자동',manual:'수동입력',fallback:'직전값 유지'};
const SCEN={
  kr:[
    {p:'가능성 중상',c:'warn',t:'박스권 소화',
     b:'한은 금통위 + 외국인 매도 지속 여부에 따라 등락. 코스닥 펀드 자금이 하방 지지.'},
    {p:'가능성 중',c:'warn',t:'상승 재개',
     b:'금리 인상 + 외국인 순매수 전환 + 환율 안정 동시 충족 시.'},
    {p:'가능성 낮음',c:'danger',t:'추가 조정',
     b:'미 국채금리 재상승 + 환율 급등 + 크레딧 악화 동시 발생 시.'},
    {p:'꼬리 위험',c:'danger',t:'유동성 경색',
     b:'CP 100bp+ / BBB- 400bp+ / 환율 1550원+ 동시. 개연성 낮음.'},
  ],
  us:[
    {p:'가능성 중상',c:'warn',t:'고금리 장기화',
     b:'CPI·PPI 둔화 지연 시 연준 인하 지연. 10Y 4.5%+ 고착.'},
    {p:'가능성 중',c:'warn',t:'유가發 인플레 재점화',
     b:'WTI 100$+ / 브렌트 105$+ 지속 시 CPI 반등.'},
    {p:'가능성 낮음',c:'danger',t:'장단기 역전 재발',
     b:'단기금리 급등으로 10Y-2Y 역전 시 침체 우려 부각.'},
    {p:'가능성 낮음',c:'ok',t:'디스인플레 재개',
     b:'CPI 3% 하회 + 유가 안정 시 연준 인하 기대 회복.'},
  ],
};
const CHK={
  kr:[
    {c:'var(--danger)',t:'한은 금통위 금리 결정',d:'인상 시 원화 강세→외국인 복귀. 동결 시 환율 압박 지속.'},
    {c:'var(--danger)',t:'환율 1,510/1,520원 돌파',d:'경보선. 1,490원 이하면 수급 전환 신호.'},
    {c:'var(--warn)',t:'외국인 코스피 순매수 전환',d:'순매수 전환 = 추세 반전 1차 신호.'},
    {c:'var(--warn)',t:'BBB- 300bp 완전 돌파',d:'돌파 시 차익실현→유동성 경색 전환.'},
    {c:'var(--ok)',t:'반도체 펀더멘털 점검',d:'수출 증가율 플러스면 구조적 동력 유효.'},
  ],
  us:[
    {c:'var(--danger)',t:'CPI·PPI 발표 (매월 중순)',d:'3% 상회 지속 시 연준 인하 지연.'},
    {c:'var(--danger)',t:'미국 10Y 5% 돌파 여부',d:'5% 상회 시 글로벌 위험자산 동반 조정.'},
    {c:'var(--warn)',t:'장단기 스프레드 역전 여부',d:'0%p 하회 시 경기침체 선행 신호.'},
    {c:'var(--warn)',t:'WTI 100$ / 브렌트 105$ 돌파',d:'에너지發 인플레 재점화 임계선.'},
    {c:'var(--ok)',t:'VIX 20 이하 안착',d:'20 하회 시 시장 안정 국면 복귀.'},
  ],
};

let DATA=null, curMkt='kr', curTab='dashboard';

function sColor(s){return s>=55?'var(--ok)':s>=40?'var(--warn)':'var(--danger)';}
function sBg(s){return s>=55?'var(--ok-bg)':s>=45?'var(--warn-bg)':'var(--danger-bg)';}
function sTx(s){return s>=55?'var(--ok-tx)':s>=45?'var(--warn-tx)':'var(--danger-tx)';}
function sLabel(s){
  if(s>=65)return'안정';if(s>=55)return'숨고르기';
  if(s>=45)return'위험 우세';if(s>=38)return'위기 국면';return'위기 심화';}
function stColor(s){return s==='ok'?'var(--ok)':s==='danger'?'var(--danger)':'var(--warn)';}
function barPct(id,v){
  if(v==null)return 30;
  if(id==='foreigner')return v>0?35:Math.min(95,Math.abs(v)/40000*100);
  const r=META[id]&&META[id].rng;
  if(!r)return 50;
  return Math.max(5,Math.min(97,(v-r[0])/(r[1]-r[0])*100));
}
function fmtDate(d){
  if(!d)return'';
  return d.slice(0,4)+'년 '+(+d.slice(5,7))+'월 데이터';
}

function render(){
  if(curMkt==='summary'){renderSummary();return;}
  const m=DATA[curMkt],inds=m.indicators,score=m.score;
  let h=`<div class="tab-bar">
    <button class="tab ${curTab==='dashboard'?'active':''}" data-tab="dashboard">대시보드</button>
    <button class="tab ${curTab==='scenario'?'active':''}" data-tab="scenario">시나리오</button>
    <button class="tab ${curTab==='checklist'?'active':''}" data-tab="checklist">체크리스트</button>
  </div>`;

  // 대시보드
  h+=`<div class="view ${curTab==='dashboard'?'active':''}">`;
  h+=`<div class="score-banner" style="background:${sBg(score)}">
    <div class="score-num" style="color:${sTx(score)}">${score}</div>
    <div><div class="score-title" style="color:${sTx(score)}">${sLabel(score)} · ${curMkt==='kr'?'한국':'미국'} 시장</div>
    <div class="score-sub" style="color:${sTx(score)}">${curMkt==='kr'?'코스피 '+(m.kospi?m.kospi.toLocaleString():'-'):'8개 지표 종합'} · 100점 만점(낮을수록 위험)</div></div></div>`;

  if(curMkt==='us'&&m.macro){
    h+='<div class="macro-banner">';
    ['cpi','ppi'].forEach(k=>{
      const x=m.macro[k];if(!x)return;
      const sc=x.status==='ok'?60:x.status==='warn'?48:30;
      h+=`<div class="mb-card" style="background:${sBg(sc)}">
        <div class="mb-lb" style="color:${sTx(sc)}">${x.label}</div>
        <div class="mb-val" style="color:${sTx(sc)}">${x.value||'-'}</div>
        <div class="mb-date" style="color:${sTx(sc)}">${fmtDate(x.date)}</div></div>`;
    });
    h+='</div>';
  }

  const fb=inds.filter(i=>i.source==='fallback').length;
  if(fb>0)h+=`<div class="abar">⚠ ${fb}개 지표가 자동수집 실패로 직전값 유지 중입니다.</div>`;

  h+='<div class="ind-grid">';
  inds.forEach(ind=>{
    const dc=ind.status==='danger'?'dot-d':ind.status==='warn'?'dot-w':'dot-ok';
    h+=`<div class="ind-card">
      <div class="ic-top"><div class="ic-label">${ind.label}</div>
        <span class="ic-dot ${dc}"></span></div>
      <div class="ic-val">${ind.value!=null?ind.value:'-'}<span style="font-size:12px;font-weight:400;color:var(--tx2)">${ind.unit}</span></div>
      <div class="ic-sub">${ind.cat}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${barPct(ind.id,ind.raw)}%;background:${stColor(ind.status)}"></div></div>
      <div class="ic-src" style="color:var(--tx3)">${SRC[ind.source]||ind.source}</div>
    </div>`;
  });
  h+='</div></div>';

  // 시나리오
  h+=`<div class="view ${curTab==='scenario'?'active':''}">
    <div class="sec-title">단기 시나리오</div><div class="ind-grid">`;
  SCEN[curMkt].forEach(s=>{
    const sc=s.c==='ok'?60:s.c==='warn'?48:30;
    h+=`<div class="ind-card">
      <span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:4px;
        background:${sBg(sc)};color:${sTx(sc)}">${s.p}</span>
      <div style="font-size:12px;font-weight:600;margin:5px 0 3px">${s.t}</div>
      <div style="font-size:11px;color:var(--tx2);line-height:1.55">${s.b}</div></div>`;
  });
  h+='</div></div>';

  // 체크리스트
  h+=`<div class="view ${curTab==='checklist'?'active':''}">
    <div class="sec-title">모니터링 체크리스트</div>`;
  CHK[curMkt].forEach(c=>{
    h+=`<div style="display:flex;gap:10px;align-items:flex-start;padding:10px;
      background:var(--surface);border-radius:8px;margin-bottom:8px">
      <span style="color:${c.c};font-size:15px;flex-shrink:0">●</span>
      <div><div style="font-size:13px;font-weight:600;margin-bottom:2px">${c.t}</div>
      <div style="font-size:12px;color:var(--tx2);line-height:1.5">${c.d}</div></div></div>`;
  });
  h+='</div>';

  document.getElementById('body').innerHTML=h;
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick=()=>{curTab=t.dataset.tab;render();};
  });
}

function renderSummary(){
  const k=DATA.kr.score, u=DATA.us.score;
  const ai=DATA.ai||{};
  let h='';

  // 한국·미국 점수 요약
  h+=`<div class="score-row">
    <div class="score-mini"><div class="sm-lb">🇰🇷 한국</div>
      <div class="sm-num" style="color:${sColor(k)}">${k}</div></div>
    <div class="score-mini"><div class="sm-lb">🇺🇸 미국</div>
      <div class="sm-num" style="color:${sColor(u)}">${u}</div></div>
  </div>`;

  // 한국 AI 해석
  h+=`<div class="ai-card">
    <div class="ai-card-hd"><span class="ai-flag">🇰🇷</span>
    <div><div class="ai-card-title">한국 시장 AI 해석</div>
    <div class="ai-card-meta">${DATA.updated_kr||''} 기준 · 건전성 ${k}/100</div></div></div>
    <div class="ai-card-body">${ai.kr||'분석 대기 중'}</div></div>`;

  // 미국 AI 해석
  h+=`<div class="ai-card">
    <div class="ai-card-hd"><span class="ai-flag">🇺🇸</span>
    <div><div class="ai-card-title">미국 시장 AI 해석</div>
    <div class="ai-card-meta">${DATA.updated_us||''} 기준 · 건전성 ${u}/100</div></div></div>
    <div class="ai-card-body">${ai.us||'분석 대기 중'}</div></div>`;

  // 종합 요약
  h+=`<div class="ai-summary">
    <div class="ai-card-hd"><span class="ai-flag">✦</span>
    <div><div class="ai-card-title">글로벌 종합 요약</div>
    <div class="ai-card-meta">한국·미국 16개 지표 통합 분석</div></div></div>
    <div class="ai-card-body">${ai.summary||'한국·미국 분석이 모두 생성되면 표시됩니다.'}</div></div>`;

  document.getElementById('body').innerHTML=h;
}

document.querySelectorAll('.ms-btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.ms-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    curMkt=b.dataset.mkt;curTab='dashboard';
    render();
  };
});

fetch('data.json?t='+Date.now())
  .then(r=>r.json())
  .then(d=>{
    DATA=d;
    const uk=d.updated_kr?'한국 업데이트 '+d.updated_kr:'';
    const uu=d.updated_us?'미국 업데이트 '+d.updated_us:'';
    document.getElementById('upd').innerHTML=
      (uk?uk+'<br>':'')+(uu||d.updated_kst||'');
    render();
  })
  .catch(e=>{
    document.getElementById('body').innerHTML=
      '<div class="loading">data.json 을 불러오지 못했습니다.<br>'+
      'GitHub Pages 환경에서 실행하세요.</div>';
  });
</script>
</body>
</html>
